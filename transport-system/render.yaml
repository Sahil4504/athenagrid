# Render Blueprint for the AthenaGrid backend (NestJS API + managed Postgres).
# In Render: New → Blueprint → connect your repo. If the repo root is the parent
# "AthenaGrid" folder, keep `rootDir: transport-system`; if the repo IS the
# transport-system folder, delete the rootDir line.

databases:
  - name: athenagrid-db
    plan: free

services:
  - type: web
    name: athenagrid-api
    runtime: node
    plan: free
    rootDir: transport-system
    buildCommand: >-
      npm install &&
      npm run build --workspace @athenagrid/shared &&
      npm --workspace @athenagrid/api run prisma:generate &&
      npm run build --workspace @athenagrid/api
    # db push runs at startup (DATABASE_URL guaranteed present at runtime).
    startCommand: >-
      npx prisma db push --schema apps/api/prisma/schema.prisma --skip-generate &&
      node apps/api/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: athenagrid-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: API_PREFIX
        value: api/v1
      - key: CARRIER_COMMISSION_RATE
        value: "0.08"
      - key: SHIPPER_FEE_RATE
        value: "0.04"
      # Auto-verify carriers so friends can bid without an admin approval step.
      - key: AUTO_VERIFY_CARRIERS
        value: "true"
      # Wildcard is fine (Bearer-token auth, no cookies). Lock to your Netlify URL later.
      - key: CORS_ORIGIN
        value: "*"
      - key: NODE_VERSION
        value: "20"
